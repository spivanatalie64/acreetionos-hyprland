name: Build ISO
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ISO
        run: bash build.sh
      - name: Upload to R2
        env:
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          BUCKET: acreetionos-hyprland
        run: |
          ISO=$(ls *.iso 2>/dev/null | head -1)
          [ -z "$ISO" ] && echo "No ISO" && exit 0
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/r2/buckets" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -d "{\"name\":\"$BUCKET\"}" || true
          U=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/r2/buckets/$BUCKET/objects/${ISO}/upload" \
            -H "Authorization: Bearer $CF_TOKEN" -d '{}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('result',{}).get('uploadURL',''))")
          [ -n "$U" ] && curl -s -X PUT "$U" --data-binary @"$ISO" && echo "✓ Uploaded $ISO" || echo "Upload failed"
